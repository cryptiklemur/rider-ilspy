name: Feature request
description: Suggest a new feature or enhancement
title: "[feature] "
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What are you trying to do that you cant today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior youd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches youve thought about, and why they didnt fit.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the plugin does this touch?
      options:
        - frontend (Kotlin / Rider UI)
        - backend (C# / decompiler)
        - decompiler (banner, output, formatting)
        - build / CI
        - other / not sure
    validations:
      required: true
