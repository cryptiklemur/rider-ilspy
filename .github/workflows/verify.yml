name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache plugin verifier IDE downloads
        uses: actions/cache@v4
        with:
          path: ~/.pluginVerifier/ides
          key: ${{ runner.os }}-pv-ides-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-pv-ides-

      - name: verifyPlugin
        run: ./gradlew verifyPlugin --stacktrace

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier
          if-no-files-found: ignore
